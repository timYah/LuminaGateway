services:
  gateway:
    build:
      context: .
    image: lumina-gateway:local
    restart: unless-stopped
    init: true
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      DATABASE_TYPE: ${DATABASE_TYPE:-sqlite}
      DATABASE_URL: ${DATABASE_URL:-file:./.runtime/lumina.db}
      GATEWAY_API_KEY: ${GATEWAY_API_KEY}
      DEFAULT_INPUT_PRICE: ${DEFAULT_INPUT_PRICE:-0.0}
      DEFAULT_OUTPUT_PRICE: ${DEFAULT_OUTPUT_PRICE:-0.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./.runtime/docker:/app/.runtime
